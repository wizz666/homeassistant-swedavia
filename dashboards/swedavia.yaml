  # ══════════════════════════════════════════════════════════════════════════
  # FLIK 3 – SÖK FLYG
  # ══════════════════════════════════════════════════════════════════════════
  - title: Sök
    path: search
    icon: mdi:magnify
    panel: false
    badges: []
    cards:
      - type: vertical-stack
        cards:

          - type: entities
            title: "🔍 Sök flygnummer"
            show_header_toggle: false
            card_mod:
              style: |
                ha-card { background: #0d0d0d !important; border: 1px solid #2a2a2a !important; }
                .card-header { color: #ffc200 !important; }
            entities:
              - entity: input_text.swedavia_search_flight
                name: "Flygnummer (t.ex. SK1234)"

          - type: custom:button-card
            entity: input_text.swedavia_search_flight
            show_name: false
            show_icon: false
            show_state: false
            show_label: true
            tap_action:
              action: call-service
              service: swedavia.search_flight
              service_data:
                flight_id: "[[[ return states['input_text.swedavia_search_flight']?.state||''; ]]]"
            styles:
              card:
                - background: "#1a3a6e"
                - border: "1px solid #2a5aaa"
                - border-radius: "6px"
                - padding: "16px"
                - cursor: "pointer"
              label:
                - width: "100%"
                - font-family: "'Courier New', Courier, monospace"
                - text-align: "center"
            label: |
              [[[
                return `<div style="text-align:center;width:100%">
                  <div style="font-size:1.5rem;margin-bottom:6px">🔍</div>
                  <div style="color:#ffffff;font-size:1rem;font-weight:bold;letter-spacing:0.08em">SÖK FLYG</div>
                  <div style="color:#8ab4f8;font-size:0.75rem;margin-top:4px">Tryck för att söka bland alla flygplatser</div>
                </div>`;
              ]]]

          - type: custom:button-card
            entity: sensor.swedavia_sokresultat
            show_icon: false
            show_name: false
            show_state: false
            show_label: true
            styles:
              card:
                - background: "#0d0d0d"
                - border: "1px solid #2a2a2a"
                - border-radius: "6px"
                - padding: "16px"
              label:
                - width: "100%"
                - font-family: "'Courier New', Courier, monospace"
            label: |
              [[[
                const result = states['sensor.swedavia_sokresultat']?.state||'';
                if (!result || result==='Ange flygnummer' || result==='unavailable') {
                  return `<span style="color:#888;font-size:0.85rem">Ange ett flygnummer ovan och tryck SÖK.</span>`;
                }
                // Format: "GOT  KL1239  ←  Amsterdam  22:20  📅 PLANERAD"
                // Arrow + 2 spaces splits arrow from city — fix by joining parts[2]+parts[3]
                const parts = result.split(/\s{2,}/).map(p => p.trim()).filter(Boolean);
                const ap     = parts[0]||'';
                const flight = parts[1]||'';
                const arrow  = parts[2]||'';   // "→" or "←"
                const city   = parts[3]||'';   // "Amsterdam"
                const rutt   = arrow + ' ' + city;
                const time   = parts[4]||'';
                const status = parts[5]||'';
                const gate   = parts[6]||'–';
                const s = status.toUpperCase();
                let color='#00cc44';
                if (s.includes('INSTÄLLT')||s.includes('CANCEL'))      color='#ff3333';
                else if (s.includes('AVGÅTT')||s.includes('ANKOMMIT')) color='#777777';
                else if (s.includes('FÖRSEN')||s.includes('DELAY'))    color='#ff8800';
                else if (s.includes('BOARDING'))                        color='#00ffcc';
                const row = (label, value, vc) =>
                  `<tr>
                    <td style="padding:5px 14px 5px 0;color:#aaaaaa;font-size:0.78rem;white-space:nowrap">${label}</td>
                    <td style="padding:5px 0;color:${vc};font-size:0.85rem;font-weight:bold">${value}</td>
                  </tr>`;
                return `<div>
                  <div style="color:#888;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px;border-bottom:1px solid #2a2a2a;padding-bottom:8px">Sökresultat</div>
                  <table style="border-collapse:collapse;width:100%">
                    ${row('Flygplats', ap,     '#ffc200')}
                    ${row('Flygnr',    flight, '#ffffff')}
                    ${row('Rutt',      rutt,   '#ffffff')}
                    ${row('Tid',       time,   '#ffffff')}
                    ${row('Status',    status, color)}
                    ${row('Gate/Band', gate,   '#ffffff')}
                  </table>
                </div>`;
              ]]]
